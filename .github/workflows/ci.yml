name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install libsecp256k1 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecp256k1-dev

      - name: Install libsecp256k1 + autotools (macOS)
        if: runner.os == 'macOS'
        run: |
          # autoconf/automake/libtool are required because the
          # electrumsv-secp256k1 sdist bootstraps with autogen.sh when
          # no matching binary wheel exists for the runner's Python.
          brew install secp256k1 autoconf automake libtool

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest-cov bandit

      - name: pytest
        run: python -m pytest -q

      - name: pytest with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        run: |
          python -m pytest --cov=src/channel --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y libsecp256k1-dev
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - run: python -m mypy src/

  security-lint:
    name: bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip bandit
      - name: Run bandit (HIGH severity, MEDIUM confidence)
        run: |
          # Scan only the source tree; tests intentionally use weak fixtures.
          python -m bandit -r src/ --severity-level high --confidence-level medium

  build-zip:
    name: package zip
    runs-on: ubuntu-latest
    needs: [test, typecheck, security-lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build source ZIP
        run: |
          cd ..
          # Exclude VCS + cache dirs from the artifact.
          zip -r bonded-subsat-channel.zip bonded-subsat-channel \
              -x '*/.git/*' \
              -x '*/__pycache__/*' \
              -x '*/.mypy_cache/*' \
              -x '*/.pytest_cache/*' \
              -x '*/.hypothesis/*' \
              -x '*.pyc' \
              -x '*.coverage'
          mv bonded-subsat-channel.zip bonded-subsat-channel/
      - uses: actions/upload-artifact@v4
        with:
          name: bonded-subsat-channel-zip
          path: bonded-subsat-channel.zip
